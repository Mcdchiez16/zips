<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="#1E3A5F"/>

  <!-- Orange accent bar top-left -->
  <rect x="8" y="8" width="24" height="5" rx="2.5" fill="#F15A24"/>

  <!-- Bold "Z" lettermark -->
  <!-- Top horizontal bar -->
  <rect x="10" y="16" width="44" height="7" rx="3" fill="white"/>
  <!-- Diagonal slash -->
  <polygon points="44,23 20,41 24,41 48,23" fill="white"/>
  <!-- Bottom horizontal bar -->
  <rect x="10" y="41" width="44" height="7" rx="3" fill="white"/>

  <!-- Orange dot accent bottom-right -->
  <circle cx="52" cy="52" r="5" fill="#F15A24"/>
</svg>